name: our_chat
description: A modern, secure chat application with Clean Architecture and E2EE.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.0-0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Animation
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.1
  lottie: ^3.1.3
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  google_fonts: ^8.1.0

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  logger: ^2.5.0

  # Firebase
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  firebase_storage: ^13.4.3
  firebase_remote_config: ^6.5.3

  # Navigation
  go_router: ^17.3.0

  # Dependency Injection
  get_it: ^9.2.1
  injectable: ^3.0.0

  # Secure Storage & Crypto
  flutter_secure_storage: ^10.3.1
  cryptography: ^2.7.0
  pointycastle: ^4.0.0

  # Media & Voice
  image_picker: ^1.1.2
  video_player: ^2.9.2
  record: ^7.1.0
  audioplayers: ^6.1.0

  # WebRTC (Calls)
  flutter_webrtc: ^1.5.2
  socket_io_client: ^3.0.2

  # Notifications
  flutter_local_notifications: ^22.0.1
  firebase_messaging: ^16.4.1

  # Permissions
  permission_handler: ^12.0.3

  # Utilities
  intl: ^0.20.3
  connectivity_plus: ^7.2.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  share_plus: ^13.2.0
  dartz: ^0.10.1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  injectable_generator: ^3.0.2
  build_runner: ^2.4.13
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  very_good_analysis: ^10.3.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/

  fonts:
    - family: Pacifico
      fonts:
        - asset: assets/fonts/Pacifico-Regular.ttf